<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Order</title> 

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --primary-color: #000000; 
            --secondary-color: #000000; 
            --accent-color: #FFFF00; 
            --bg-light: #f4f7f6;      
            --bg-card: #ffffff;       
            --text-dark: #212121;     
            --shadow-subtle: 0 4px 10px rgba(0, 0, 0, 0.08); 
            --header-bg: var(--primary-color);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            padding: 10px; 
            margin: 0;
            font-size: 12px; 
            -webkit-text-size-adjust: 100%; 
            color: var(--text-dark);
        }

        .sales-order-container {
            width: 100%;
            max-width: 900px; 
            background: var(--bg-card);
            box-shadow: var(--shadow-subtle); 
            border-radius: 12px; 
            overflow: hidden; 
        }

        h2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px; 
            background-color: var(--header-bg); 
            color: white;
            margin: 0;
            font-size: 18px; 
            letter-spacing: 1px;
        }

        #grand-total-display {
            color: var(--accent-color);
            font-weight: 700;
        }

        .header-info {
            padding: 12px; 
            background-color: var(--bg-card); 
            border-bottom: 1px solid #e0e0e0; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
        }

        .info-row {
            display: flex;
            align-items: center;
            flex: 1 1 100%; 
            font-size: 12px;
        }
        @media (min-width: 500px) {
             .info-row {
                flex: 1 1 45%; 
            }
        }

        .info-row label {
            font-weight: 600;
            min-width: 70px; 
            color: var(--text-dark);
            white-space: nowrap; 
        }

        .info-row input[type="text"] {
            flex-grow: 1; 
            padding: 8px 10px; 
            border: 1px solid #e0e0e0;
            border-radius: 6px; 
            font-size: 12px; 
            transition: border-color 0.2s;
        }
        .info-row input[type="text"]:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .filter-bar {
            padding: 10px 12px; 
            font-size: 11px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px; 
        }
        
        #review-btn-trigger {
            padding: 8px 16px; 
            font-size: 12px; 
            border-radius: 6px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #review-btn-trigger:disabled {
            background-color: #ced4da; 
            cursor: not-allowed;
            opacity: 0.8;
        }

        .table-wrapper {
            max-height: 75vh; 
            overflow-y: auto; 
            border-radius: 0 0 12px 12px; 
        }

        table {
            width: 100%;
            border-collapse: separate; 
            border-spacing: 0; 
            table-layout: fixed; 
            font-size: 11px; 
        }

        thead {
            background-color: var(--primary-color);
            color: white;
            position: sticky; 
            top: 0;
            z-index: 10;
        }
        
        thead th {
            font-weight: 600;
            padding: 8px 3px; 
            border: none; 
            border-bottom: 1px solid #444444; 
        }

        th, td {
            padding: 6px 3px; 
            height: auto; 
            border: none; 
            border-bottom: 1px solid #e0e0e0; 
        }
        
        .text-left { text-align: left; padding-left: 5px; }
        .text-right { text-align: right; padding-right: 5px; font-weight: 500; }

        .order-input, .disc-input {
            width: 100%; 
            max-width: 45px; 
            padding: 3px 22px 3px 3px; 
            font-size: 11px; 
            height: 24px; 
            margin: auto; 
            display: block;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        
        .order-input::placeholder {
            color: #888;
            opacity: 1;
            font-size: 10px;
        }
		
		.order-input:disabled {
			border: none;
			background: transparent;
		}
        
        .order-input:disabled::placeholder {
            color: transparent;
        }
		
        .disc-input { max-width: 40px; }
        
        .product-group-header {
            background-color: var(--secondary-color) !important; 
            color: white;
            font-weight: 700;
            padding: 10px 12px !important; 
            cursor: pointer;
            user-select: none;
        }

        .product-group-header td::before {
            content: "+ ";
            margin-right: 8px;
        }

        .product-group-header:not(.collapsed) td::before {
            content: "- ";
        }

        .product-row {
            transition: all 0.2s;
        }

        .KEM-TONE-EXT-row, .KEM-TONE-INT-row, .ULTRASHIELD-row, .SPECTRUM-row,
        .COLORTONE-EXT-row, .COLORTONE-INT-row, .SPECTRUM-SWOB-row, .SPECTRUM-ECO-row,
        .AEROSOL-row, .COLORANT-row, .ABC-row, .TAMITEX-CT-row, .TAMITEX-WF-row,
        .TAMITEX-CG-row, .VINOTEX-CT-row, .VINOTEX-WF-row, .APOLLO-row,
        .SPECTRUM-GRANITE-row, .SPECTRUM-FLOORKOTE-row { background-color: #f9f9f9; } 

        #review-page {
            display: none; 
            background-color: white;
        }

        #capture-area {
            background-color: white;
            padding: 38px;
            color: var(--text-dark);
            width: fit-content;
            min-width: 100%;
            box-sizing: border-box;
        }
        
        .review-header-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary-color);
        }
        
        .review-info-table {
            width: 100%;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .review-info-table td {
            padding: 2px 0;
            border: none;
        }
        .review-label {
            width: 80px;
            color: black;
        }
        .review-value {
            font-weight: bold;
            text-transform: uppercase;
            color: black;
        }

        .review-scroll-wrapper {
            width: 100%;
            overflow-x: auto;
        }

        .review-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
            table-layout: auto; 
            color: black;
            margin-bottom: 15px;
        }

        .review-table th {
            background-color: black; 
            color: white;
            font-weight: bold;
            text-align: center;
            border: none;
            border-bottom: 1px solid white;
            padding: 8px 5px;
            vertical-align: middle;
            text-transform: uppercase;
        }

        .review-table td {
            border: none; 
            border-bottom: 1px solid #e0e0e0; 
            padding: 8px 5px;
            color: black;
        }
        
        .rev-col-product-group { 
            text-align: left; 
            font-weight: normal;
            min-width: 90px;
            white-space: normal;
        }
        .rev-col-product-cat { 
            text-align: left; 
            font-weight: normal;
            min-width: 110px;
            white-space: normal;
        }
        .rev-col-disc { 
            text-align: center; 
            min-width: 45px;
            white-space: normal;
        }
        .rev-col-qty { 
            text-align: center;           
            min-width: 120px;           
            white-space: normal;
            padding-left: 8px;          
        }
        .rev-col-total { 
            text-align: right; 
            width: auto;
            white-space: nowrap;
            font-weight: bold;
            padding-left: 10px !important;
        }

        .review-total-section {
            width: 100%;
            border-top: 2px solid #333;
            padding-top: 12px;
            margin-top: 10px;
        }

        .review-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 13px;
        }

        .review-total-label {
            font-weight: 600;
            color: #222;
        }

        .review-total-value {
            font-weight: bold;
            text-align: right;
            min-width: 140px;
        }

        .review-grand-total-row {
            background-color: #f8f8f8;
            padding: 12px 0;
            border-top: 2px solid #000;
            margin-top: 8px;
        }

        .review-grand-total-row .review-total-label {
            font-size: 16px;
            font-weight: 700;
        }

        .review-grand-total-row .review-total-value {
            font-size: 18px;
            color: #000;
        }

        .review-notes-section {
            margin-top: 20px;
            padding-top: 5px;
            width: 100%;
        }
        .review-notes-section label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 12px;
            color: black;
        }
        .review-notes-section textarea {
            width: 100%;
            min-height: 40px;
            padding: 8px 0;
            border: none;
            border-radius: 0;
            background: transparent;
            font-family: inherit;
            font-size: 12px;
            resize: none;
            box-sizing: border-box;
            line-height: 1.4;
            color: black;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: hidden;
        }

        .review-actions {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding-bottom: 20px;
        }

        .btn-action {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
            width: 45%; 
            max-width: 150px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn-edit { background-color: #ff9800; } 
        .btn-save-jpg { background-color: #28a745; } 
    </style>
</head>
<body>

<div class="sales-order-container">
    
    <div id="main-form">
        <h2>
            <span>Sales Order</span>
            <span id="grand-total-display">0</span>
        </h2> 
        
        <div class="header-info">
            <div class="info-row">
                <label for="nama-toko">Toko:</label>
                <input type="text" id="nama-toko" placeholder="Nama dan Alamat Toko">
            </div>
            <div class="info-row">
                <label for="salesman">Salesman:</label>
                <input type="text" id="salesman" placeholder="Nama Salesman">
            </div>
        </div>
        
        <div class="filter-bar"><button id="review-btn-trigger" disabled>Cetak</button>
            <button class="btn-action" id="btn-export" style="background-color: #17a2b8; padding: 8px 14px; font-size: 12px;">Export</button>
            <button class="btn-action" id="btn-import" style="background-color: #6c757d; padding: 8px 14px; font-size: 12px;">Import</button>
        </div>
        
        <div class="table-wrapper" id="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th class="text-left">PRODUK</th>
                        <th>DISC</th>
                        <th colspan="3">ORDER (QTY)</th>
                        <th>TOTAL (RP)</th>
                    </tr>
                </thead>
                <tbody id="product-list"></tbody>
            </table>
        </div>
    </div>

    <div id="review-page">
        <div class="review-scroll-wrapper">
            <div id="capture-area">
                <div class="review-header-title">Sales Order</div>
                
                <table class="review-info-table">
                    <tr>
                        <td class="review-label">Toko</td>
                        <td class="review-value" id="review-toko">-</td>
                    </tr>
                    <tr>
                        <td class="review-label">Salesman</td>
                        <td class="review-value" id="review-salesman">-</td>
                    </tr>
                </table>

                <table class="review-table">
                    <thead>
                        <tr>
                            <th colspan="2">Produk</th> 
                            <th>DISC</th>
                            <th>ORDER (QTY)</th>
                            <th class="disc-extra">DISC EXTRA</th>
                            <th>TOTAL (RP)</th>
                        </tr>
                    </thead>
                    <tbody id="review-table-body"></tbody>
                </table>

                <div class="review-total-section">
                    <div class="review-total-row review-grand-total-row">
                        <span class="review-total-label">GRAND TOTAL</span>
                        <span id="review-grand-total" class="review-total-value">0</span>
                    </div>
                </div>

                <div class="review-notes-section">
                    <label for="catatan-so">Catatan:</label>
                    <textarea id="catatan-so" placeholder="Tulis kode warna, voucher, atau apapun di sini..." rows="3"></textarea>
                </div>
            </div>
        </div>

        <div class="review-actions">
            <button class="btn-action btn-edit" id="btn-edit">Edit</button>
            <button class="btn-action btn-save-jpg" id="btn-save-jpg">Simpan JPG</button>
        </div>
    </div>

</div>

    function formatRupiah(number) {
        if (number === 0 || isNaN(number)) return '-'; 
        return Math.round(number).toLocaleString('id-ID', { minimumFractionDigits: 0 });
    }
    
    function createTableRows(data) {
        let html = '';
        let lastProduct = '';

        data.forEach((item, index) => {
            const cssClassName = item.produk.replace(/\s/g, '-').replace(/\//g, '-').toUpperCase();
            
            if (item.produk && item.produk !== lastProduct) {
                lastProduct = item.produk;
                html += `<tr class="product-group-header collapsed" data-group="${cssClassName}">`;
                html += `<td colspan="6" class="group-label text-left">${item.produk}</td>`; 
                html += `</tr>`;
            }
            
            let rowHtml = `<tr class="product-row ${cssClassName}-row" data-index="${index}" data-group="${cssClassName}">`; 
            rowHtml += `<td class="text-left row-category">${item.kategori}</td>`; 
            rowHtml += `<td><input type="number" min="0" max="100" value="${item.disc}" class="disc-input" step="0.5"></td>`;
            
            const disabledKg = item.hargaKg > 0 ? '' : 'disabled';
            const disabledGln = item.hargaGln > 0 ? '' : 'disabled';
            const disabledPl = item.hargaPl > 0 ? '' : 'disabled';

            rowHtml += `<td><input type="number" min="0" value="" placeholder="${item.placeholderKg}" ${disabledKg} class="order-input kg-qty" data-price="${item.hargaKg}"></td>`;
            rowHtml += `<td><input type="number" min="0" value="" placeholder="${item.placeholderGln}" ${disabledGln} class="order-input gln-qty" data-price="${item.hargaGln}"></td>`;
            rowHtml += `<td><input type="number" min="0" value="" placeholder="${item.placeholderPl}" ${disabledPl} class="order-input pl-qty" data-price="${item.hargaPl}"></td>`;
            rowHtml += `<td class="total-row text-right" data-total="0">-</td>`;
            rowHtml += `</tr>`;
            html += rowHtml;
        });

        document.getElementById('product-list').innerHTML = html;

        // Default collapsed: sembunyikan semua product row
        document.querySelectorAll('.product-row').forEach(row => {
            row.style.display = 'none';
        });

        attachCollapseListeners();
        attachEventListeners();
    }

    function toggleGroup(header) {
        const groupName = header.dataset.group;
        const isCollapsed = header.classList.toggle('collapsed');
        
        document.querySelectorAll(`.product-row[data-group="${groupName}"]`).forEach(row => {
            if(isCollapsed){
            const hasValue=[...row.querySelectorAll('.kg-qty,.gln-qty,.pl-qty')].some(i=>(parseFloat(i.value)||0)>0);
            row.style.display=hasValue?'':'none';
        }else{row.style.display='';}
        });
    }

    function attachCollapseListeners() {
        document.querySelectorAll('.product-group-header').forEach(header => {
            header.addEventListener('click', () => toggleGroup(header));
        });
    }

    function applyRowFilter(row, total) {
        const filterActive = false;
        if (filterActive && total === 0) {
            row.style.display = 'none';
        } else {
            const header=document.querySelector(`.product-group-header[data-group="${row.dataset.group}"]`);
            const hasValue=[...row.querySelectorAll('.kg-qty,.gln-qty,.pl-qty')].some(i=>(parseFloat(i.value)||0)>0); row.style.display = header && header.classList.contains('collapsed') ? (hasValue?'':'none') : '';
        }
    }

    function calculateRow(row) {
        const inputKg   = row.querySelector('.kg-qty');
        const inputGln  = row.querySelector('.gln-qty');
        const inputPl   = row.querySelector('.pl-qty');
        const inputDisc = row.querySelector('.disc-input'); 

        if (!inputKg) return; 

        const hargaKg = parseFloat(inputKg.dataset.price)  || 0;
        const qtyKg   = parseFloat(inputKg.value)   || 0; 
        const hargaGln = parseFloat(inputGln.dataset.price) || 0;
        const qtyGln   = parseFloat(inputGln.value)  || 0;
        const hargaPl  = parseFloat(inputPl.dataset.price)  || 0;
        const qtyPl    = parseFloat(inputPl.value)   || 0;
        const discPercent = parseFloat(inputDisc.value) || 0; 
        
        let total = ((hargaKg * qtyKg) + (hargaGln * qtyGln) + (hargaPl * qtyPl)) * (1 - (discPercent / 100));
        total = Math.round(total); 

        const totalDisplayElement = row.querySelector('.total-row');
        totalDisplayElement.dataset.total = total; 
        totalDisplayElement.textContent = formatRupiah(total);

        applyRowFilter(row, total);
        calculateGrandTotal();
    }

    function calculateGrandTotal() {
        let grandTotal = 0;
        const totalElements = document.querySelectorAll('.total-row');
        const reviewBtn = document.getElementById('review-btn-trigger'); 
        
        totalElements.forEach(element => {
            grandTotal += parseFloat(element.dataset.total) || 0;
        });

        document.getElementById('grand-total-display').textContent = formatRupiah(grandTotal);
        reviewBtn.disabled = grandTotal === 0;
    }

    function toggleFilter() {
        const filterActive = false;
        
        document.querySelectorAll('.product-row').forEach(row => {
            const total = parseFloat(row.querySelector('.total-row').dataset.total) || 0;
            if (filterActive && total===0){row.style.display='none';} else { const header=document.querySelector(`.product-group-header[data-group="${row.dataset.group}"]`); row.style.display=(header&&header.classList.contains('collapsed'))?'none':''; }
        });

        document.querySelectorAll('.product-group-header').forEach(header => {
            const groupName = header.dataset.group;
            const hasVisibleItem = Array.from(document.querySelectorAll(`.product-row[data-group="${groupName}"]`))
                .some(row => row.style.display !== 'none');
            header.style.display = (filterActive && !hasVisibleItem) ? 'none' : '';
        });
        
        calculateGrandTotal(); 
    }
    
    function showReviewPage() {
        const namaToko = document.getElementById('nama-toko').value.trim() || "-";
        const salesman = document.getElementById('salesman').value.trim() || "-";

        document.getElementById('review-toko').textContent = namaToko;
        document.getElementById('review-salesman').textContent = salesman;

        const tbody = document.getElementById('review-table-body');
        tbody.innerHTML = '';
        
        const rows = document.querySelectorAll('.product-row');

        rows.forEach(row => {
            const originalTotal = parseFloat(row.querySelector('.total-row').dataset.total) || 0;
            
            if (originalTotal > 0) {
                const dataIndex = row.dataset.index;
                const productObj = productData[dataIndex];
                
                const discVal = row.querySelector('.disc-input').value;
                const kgVal  = row.querySelector('.kg-qty').value.trim();
                const glnVal = row.querySelector('.gln-qty').value.trim();
                const plVal  = row.querySelector('.pl-qty').value.trim();
                
                let qtyParts = [];
                if (kgVal)  qtyParts.push(`${kgVal} (${productObj.placeholderKg})`);
                if (glnVal) qtyParts.push(`${glnVal} (${productObj.placeholderGln})`);
                if (plVal)  qtyParts.push(`${plVal} (${productObj.placeholderPl})`);
                
                const qtyDisplay = qtyParts.join(' , ').trim();

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="rev-col-product-group">${productObj.produk}</td>
                    <td class="rev-col-product-cat">${productObj.kategori}</td>
                    <td class="rev-col-disc">${discVal.replace('.', ',')}%</td>
                    <td class="rev-col-qty">${qtyDisplay || ''}</td>
                    <td class="rev-col-disc disc-extra"><input type="number" min="0" max="100" value="0" step="0.5" class="review-additional-disc" style="width:60px; text-align:center; font-size:11px;"></td>
                    <td class="rev-col-total" data-original="${originalTotal}">${formatRupiah(originalTotal)}</td>
                `;
                tbody.appendChild(tr);

                const addDiscInput = tr.querySelector('.review-additional-disc');
                addDiscInput.addEventListener('input', () => {
                    updateRowTotal(tr);
                });
            }
        });

        updateGrandTotal();

        document.getElementById('main-form').style.display = 'none';
        document.getElementById('review-page').style.display = 'block';

        const catatanArea = document.getElementById('catatan-so');
        catatanArea.style.height = 'auto';
        catatanArea.style.height = (catatanArea.scrollHeight) + 'px';
    }

    function updateRowTotal(tr) {
        const originalTotal = parseFloat(tr.querySelector('.rev-col-total').dataset.original) || 0;
        const addDiscPercent = parseFloat(tr.querySelector('.review-additional-disc').value) || 0;
        
        let newTotal = originalTotal * (1 - addDiscPercent / 100);
        newTotal = Math.round(newTotal);
        
        tr.querySelector('.rev-col-total').textContent = formatRupiah(newTotal);
        updateGrandTotal();
    }

    function updateGrandTotal() {
        let total = 0;
        document.querySelectorAll('#review-table-body .rev-col-total').forEach(td => {
            const val = td.textContent.replace(/[^0-9]/g, '');
            total += parseFloat(val) || 0;
        });
        document.getElementById('review-grand-total').textContent = formatRupiah(total);
    }

    function hideReviewPage() {
        document.getElementById('review-page').style.display = 'none';
        document.getElementById('main-form').style.display = 'block';
    }

    async function saveReviewAsJpg() {
        const captureElement = document.getElementById('capture-area');
        const namaToko = document.getElementById('nama-toko').value.trim() || "SO"; 
        const catatanArea = document.getElementById('catatan-so');
        
        const parent = catatanArea.parentNode;
        const originalValue = catatanArea.value;

        const textReplacement = document.createElement('div');
        textReplacement.style.width = '100%';
        textReplacement.style.fontSize = '12px';
        textReplacement.style.fontFamily = 'inherit';
        textReplacement.style.color = 'black';
        textReplacement.style.whiteSpace = 'pre-wrap';
        textReplacement.style.wordWrap = 'break-word';
        textReplacement.style.paddingTop = '5px';
        textReplacement.innerText = originalValue || "-";

        catatanArea.style.display = 'none';
        parent.appendChild(textReplacement);

        try {
            const canvas = await html2canvas(captureElement, {
                scale: 2, 
                backgroundColor: '#ffffff',
                useCORS: true,
                width: captureElement.scrollWidth,
                height: captureElement.scrollHeight
            });

            const imageURL = canvas.toDataURL('image/jpeg', 0.95);
            
            const downloadLink = document.createElement('a');
            downloadLink.href = imageURL;
            downloadLink.download = `SO_${namaToko.replace(/\s/g, '_').toUpperCase()}_${new Date().toISOString().slice(0, 10)}.jpg`;
            
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);

        } catch (error) {
            console.error("Gagal save JPG:", error);
            alert("Gagal menyimpan gambar. Silakan coba lagi.");
        } finally {
            parent.removeChild(textReplacement);
            catatanArea.style.display = 'block';
        }
    }

    function exportData() {
        const data = {
            namaToko: document.getElementById('nama-toko').value,
            salesman: document.getElementById('salesman').value,
            catatan: document.getElementById('catatan-so').value,
            items: []
        };

        document.querySelectorAll('.product-row').forEach(row => {
            const index = parseInt(row.dataset.index);
            data.items.push({
                index: index,
                disc: row.querySelector('.disc-input').value,
                kg: row.querySelector('.kg-qty').value,
                gln: row.querySelector('.gln-qty').value,
                pl: row.querySelector('.pl-qty').value
            });
        });

        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `SO_${(data.namaToko || 'Data').replace(/\s+/g, '_').toUpperCase()}_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    document.getElementById('nama-toko').value = imported.namaToko || '';
                    document.getElementById('salesman').value = imported.salesman || '';
                    document.getElementById('catatan-so').value = imported.catatan || '';

                    imported.items.forEach(item => {
                        const row = document.querySelector(`.product-row[data-index="${item.index}"]`);
                        if (row) {
                            if (item.disc !== undefined) row.querySelector('.disc-input').value = item.disc;
                            if (item.kg !== undefined) row.querySelector('.kg-qty').value = item.kg;
                            if (item.gln !== undefined) row.querySelector('.gln-qty').value = item.gln;
                            if (item.pl !== undefined) row.querySelector('.pl-qty').value = item.pl;
                            calculateRow(row);
                        }
                    });
                    alert('✅ Data berhasil diimport!');
                } catch (err) {
                    alert('❌ File JSON tidak valid.');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function attachEventListeners() {
        const qtyInputs = document.querySelectorAll('.order-input');
        const discInputs = document.querySelectorAll('.disc-input');
        
        [...qtyInputs, ...discInputs].forEach(input => {
            input.addEventListener('input', function() {
                if (this.classList.contains('disc-input')) {
                    if (parseFloat(this.value) > 100) this.value = 100; 
                } 
                if (parseFloat(this.value) < 0) this.value = 0; 
                
                calculateRow(this.closest('.product-row'));
            });
            calculateRow(input.closest('.product-row'));
        });
        
        document.getElementById('review-btn-trigger').addEventListener('click', showReviewPage);
        document.getElementById('btn-edit').addEventListener('click', hideReviewPage);
        document.getElementById('btn-save-jpg').addEventListener('click', saveReviewAsJpg);
        document.getElementById('btn-export').addEventListener('click', exportData);
        document.getElementById('btn-import').addEventListener('click', importData);

        const catatanArea = document.getElementById('catatan-so');
        catatanArea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        createTableRows(productData);
    });
</script>
